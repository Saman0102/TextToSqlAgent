app:
  name: text-to-sql
  debug: true
  allowed_hosts:
    - localhost
    - 127.0.0.1

GEMINI_MODEL: gemini-2.0-flash
GEMINI_MAX_TOKENS: 512
GEMINI_TIMEOUT: 60
LOCAL_FALLBACK_MODEL: distilgpt2

# Sensitive values must go in config/.secrets or config/.secrets.yaml
database_url:
gemini_api_key:
llm_provider: gemini
gemini_model: gemini-2.0-flash
max_rows: 200
fallback_provider: local
ollama_url: http://localhost:11434/api/generate
ollama_model: llama3.1:8b
